data_path: examples/sample_data/pdf
google_drive_ids: []
previous_results: null

dispatcher_config:
  output_path: examples/process/outputs/
  use_fast_processors: false
  distributed: false
  dashboard_backend_url: null
  extract_images: true
  scheduler_file: null

  # 🔥 只保留 PDFProcessor，其他全部删掉，避免报错
  process_batch_sizes:
    - PDFProcessor: 4000

  # 🔥 严格按你给的格式写，列表格式，100% 匹配代码
  processor_config:
    MediaProcessor:
      - normal_model: "openai/whisper-large-v3-turbo"
      - fast_model: "openai/whisper-tiny"
      - type: "automatic-speech-recognition"
      - sample_rate: 10
      - batch_size: 4

    PDFProcessor:
      - PDFTEXT_CPU_WORKERS: 0
      - DETECTOR_BATCH_SIZE: 1
      - DETECTOR_POSTPROCESSING_CPU_WORKERS: 0
      - RECOGNITION_BATCH_SIZE: 1
      - OCR_PARALLEL_WORKERS: 0
      - TEXIFY_BATCH_SIZE: 1
      - LAYOUT_BATCH_SIZE: 1
      - ORDER_BATCH_SIZE: 1
      - TABLE_REC_BATCH_SIZE: 1
