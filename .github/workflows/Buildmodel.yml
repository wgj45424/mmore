name: Build mmore CPU & Upload to Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ==========================================
      # 官方完整依赖 + 缺失包 一次性全部安装
      # ==========================================
      - name: Install ALL dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install "mammoth==1.6.0" "python-docx==0.8.11" "dask==2024.10.0" "distributed==2024.10.0"
          pip install "pandas==2.2.3" "numpy==1.26.4" "scipy==1.15.1" "click==8.1.7" "tqdm==4.66.5"
          pip install "python-multipart==0.0.10" "python-dotenv==1.0.1" "pyarrow==17.0.0" "pillow==10.4.0"
          pip install "transformers==4.44.1" "sentence-transformers==3.2.1" "faiss-cpu==1.9.0"
          pip install "langchain==0.2.16" "langchain-core==0.2.38" "langchain-community==0.2.16"
          pip install "langchain-milvus==0.1.9" "langchain-aws==0.2.2" "langchain-cohere==0.1.2"
          pip install "langchain-openai==0.1.25" "langchain-huggingface==0.1.1" "langchain-mistralai==0.1.1"
          pip install "boto3==1.34.139" "botocore==1.34.139" "cohere==5.11.1" "dacite==1.8.1"
          pip install -e .

      # ==========================================
      # 正确命令
      # ==========================================
      - name: Run process
        run: |
          python -m mmore process --config-file examples/process/test_config.yaml

      - name: Run index
        run: |
          python -m mmore index --config-file examples/index/config.yaml

      # ==========================================
      # 分包打包 ≤2GB
      # ==========================================
      - name: Package cache
        run: |
          tar -cvf - . | split -d -b 2000M - mmore-output.tar.

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: mmore-output.tar.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
