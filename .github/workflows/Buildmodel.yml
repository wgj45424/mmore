name: Build mmore CPU & Upload to Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ALL dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install ".[all]"
          pip install dask distributed

      - name: Run process
        run: |
          python -m mmore process --config-file examples/process/test_config.yaml

      - name: Run index
        run: |
          python -m mmore index --config-file examples/index/config.yaml

      - name: Package cache
        run: |
          tar -cvf - . | split -d 2000M - mmore-output.tar.

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: mmore-output.tar.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUR_TOKEN }}
