name: Build mmore CPU & Upload to Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actionssetup-python@v5
        with:
          python-version: "3.10"

      # ==============================================
      # 全量依赖安装：所有 langchain 全家桶 + 底层库
      # 永远不再缺任何包！！！
      # ==============================================
      - name: Install ALL dependencies (CPU only)
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install langchain langchain-core langchain-community
          pip install langchain-milvus langchain-aws langchain-cohere langchain-openai langchain-huggingface langchain-mistralai
          pip install faiss-cpu sentence-transformers transformers datasets
          pip install scipy numpy pandas click pillow tqdm pyarrow pydantic
          pip install boto3 botocore cohere
          pip install -e .

      # 运行第一个命令
      - name: Run process index
        run: |
          python -m mmore index --config-file examples/process/test_config.yaml

      # 运行第二个命令
      - name: Run final index
        run: |
          python -m mmore index --config-file examples/index/config.yaml

      # ==============================================
      # 分包打包：完整保留缓存目录，单个 ≤2GB
      # ==============================================
      - name: Package output (split <2GB)
        run: |
          tar -cvf - . | split -d -b 2000M - mmore-output.tar.

      # 上传所有分包到 Release
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: mmore-output.tar.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
