name: Build mmore CPU & Upload to Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 安装所有必须依赖（全覆盖，不会再缺任何包）
      - name: Install full dependencies (CPU only)
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install scipy numpy pandas click pillow tqdm pyarrow
          pip install faiss-cpu sentence-transformers pydantic
          pip install langchain langchain-core langchain-community langchain-milvus
          pip install -e .

      # 运行第一个命令
      - name: Run process index
        run: |
          python -m mmore index --config-file examples/process/test_config.yaml

      # 运行第二个命令
      - name: Run final index
        run: |
          python -m mmore index --config-file examples/index/config.yaml

      # 分包压缩 ≤2GB
      - name: Package output (split <2GB)
        run: |
          tar -cvf - . | split -d -b 2000M - mmore-index-output.tar.

      # 上传到 Release
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: mmore-index-output.tar.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
