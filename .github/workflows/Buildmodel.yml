name: Build mmore CPU & Upload to Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 🔥 🔥 🔥 官方一键安装所有依赖（永远不再缺包！）
      - name: Install ALL official dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install ".[all]"  # 官方完整依赖，包括 marker、pymupdf、moviepy 所有！
          pip install dask distributed

      # 正确执行流程
      - name: Run document process
        run: |
          python -m mmore process --config-file examples/process/test_config.yaml

      - name: Run index build
        run: |
          python -m mmore index --config-file examples/index/config.yaml

      # 分包打包 ≤2GB
      - name: Package cache (split <2GB)
        run: |
          tar -cvf - . | split -d -b 2000M - mmore-output.tar.

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: mmore-output.tar.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
