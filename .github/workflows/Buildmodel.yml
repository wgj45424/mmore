name: Build mmore CPU & Upload to Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # 手动触发

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 安装所有依赖（修复缺失的 scipy 等包）
      - name: Install full dependencies (CPU only)
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install scipy numpy pandas click pillow tqdm pyarrow faiss-cpu sentence-transformers
          pip install -e .

      # 第一条命令
      - name: Run process index
        run: |
          python -m mmore index --config-file examples/process/test_config.yaml

      # 第二条命令
      - name: Run final index
        run: |
          python -m mmore index --config-file examples/index/config.yaml

      # 自动分包压缩，单个不超过 2GB
      - name: Package output (split <2GB)
        run: |
          tar -cvf - . | split -d -b 2000M - mmore-index-output.tar.

      # 上传所有分包到 Release
      - name: Upload all parts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mmore-index-output.tar.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
