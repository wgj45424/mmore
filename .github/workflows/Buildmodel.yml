name: Build mmore CPU & Upload to Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ==========================
      # 全量依赖（补齐 dask 等所有包）
      # ==========================
      - name: Install ALL dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install langchain langchain-core langchain-community langchain-milvus langchain-aws langchain-cohere langchain-openai langchain-huggingface langchain-mistralai
          pip install faiss-cpu sentence-transformers transformers datasets scipy numpy pandas click pillow tqdm pyarrow pydantic boto3 botocore cohere
          pip install dask distributed python-multipart python-dotenv
          pip install -e .

      # ==========================
      # 正确命令（不会再报 indexer 缺失）
      # ==========================
      - name: Run process
        run: |
          python -m mmore process --config-file examples/process/test_config.yaml

      - name: Run index
        run: |
          python -m mmore index --config-file examples/index/config.yaml

      # ==========================
      # 分包打包 ≤2GB
      # ==========================
      - name: Package cache
        run: |
          tar -cvf - . | split -d -b 2000M - mmore-output.tar.

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: mmore-output.tar.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
