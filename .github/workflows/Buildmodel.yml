name: Build mmore CPU & Upload to Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 安装 CPU 版 PyTorch + 项目所有依赖（官方 requirements）
      - name: Install full dependencies (CPU only)
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt  # 安装项目全部依赖
          pip install -e .

      # 运行第一个命令
      - name: Run process index
        run: |
          python -m mmore index --config-file examples/process/test_config.yaml

      # 运行第二个命令
      - name: Run final index
        run: |
          python -m mmore index --config-file examples/index/config.yaml

      # 自动分包压缩，单个不超过 2GB
      - name: Package output (split <2GB)
        run: |
          tar -cvf - . | split -d -b 2000M - mmore-index-output.tar.

      # 上传所有分包到 Release
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: mmore-index-output.tar.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
