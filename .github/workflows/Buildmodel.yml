name: Buildmodel

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # 允许手动点击运行

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ==============================
      # 安装依赖（强制 CPU 版本）
      # ==============================
      - name: Install dependencies (CPU only)
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -e .

      # ==============================
      # 依次运行两个 index 命令
      # ==============================
      - name: Run process index
        run: |
          python -m mmore index --config-file examples/process/test_config.yaml

      - name: Run final index
        run: |
          python -m mmore index --config-file examples/index/config.yaml

      # ==============================
      # 自动分包压缩：单个文件 ≤2GB
      # ==============================
      - name: Package output (split <2GB)
        run: |
          # 压缩整个项目目录（完整保留模型缓存 + 输出结构）
          tar -cvf - . | split -d -b 2000M - mmore-index-output.tar.

      # ==============================
      # 上传所有分包到 GitHub Release
      # ==============================
      - name: Upload all parts to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mmore-index-output.tar.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
