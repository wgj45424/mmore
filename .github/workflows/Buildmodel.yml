name: Build mmore CPU & Upload to Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 🔥 所有依赖一次性全装，永远不缺包
      - name: Install ALL dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install dask distributed
          pip install markdown markdownify mammoth python-docx cleantext
          pip install python-multipart python-dotenv pandas numpy scipy click tqdm pyarrow pillow pydantic
          pip install transformers sentence-transformers faiss-cpu
          pip install langchain langchain-core langchain-community
          pip install langchain-milvus langchain-aws langchain-cohere langchain-openai langchain-huggingface langchain-mistralai
          pip install boto3 botocore cohere dacite openpyxl python-pptx
          pip install -e .

      # ✅ 正确命令
      - name: Run process
        run: |
          python -m mmore process --config-file examples/process/test_config.yaml

      - name: Run index
        run: |
          python -m mmore index --config-file examples/index/config.yaml

      # ✅ 分包打包 ≤2GB
      - name: Package cache (split <2GB)
        run: |
          tar -cvf - . | split -d -b 2000M - mmore-output.tar.

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: mmore-output.tar.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
