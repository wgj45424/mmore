name: Build & Publish to Release
on:
  push:
    branches: [ main ]  # 推送到 main 自动运行
  workflow_dispatch:   # 也可手动运行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 必须加这个，才能写 Release
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install ".[all]"
          pip install dask distributed

      - name: Run PDF process
        run: |
          python -m mmore process --config-file examples/process/test_config.yaml

      - name: Run index
        run: |
          python -m mmore index --config-file examples/index/config.yaml

      # 分包压缩（正确命令）
      - name: Package files
        run: |
          tar -czf - . | split -b 2000M - mmore-output.tar.gz

      # 🔥 直接发布到 Release（秒下载！）
      - name: Create Release & Upload
        uses: softprops/action-gh-release@v2
        with:
          files: mmore-output.tar.gz*
          tag_name: v${{ github.run_number }}
          name: MMORE 完整缓存包
          body: 包含处理好的 PDF + 索引缓存
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
