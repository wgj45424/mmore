name: Manual2.2 Build and Release MMORE (CPU/AMD64)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'
        type: string
      release_title:
        description: 'Release title'
        required: false
        default: 'MMORE CPU/AMD64 Release'
        type: string
      pip_index:
        description: 'Pip index URL (leave empty for default)'
        required: false
        default: 'https://pypi.tuna.tsinghua.edu.cn/simple'
        type: string

env:
  IMAGE_NAME: mmore-cpu
  PLATFORM: linux/amd64

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      # ============================================================
      # 第1步：清理磁盘空间
      # ============================================================
      - name: Maximize disk space
        run: |
          echo "=== 初始磁盘空间 ==="
          df -h /
          
          echo "=== 开始清理 ==="
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/julia
          sudo rm -rf /opt/microsoft
          sudo rm -rf /opt/pipx
          sudo rm -rf /usr/local/graalvm
          sudo rm -rf /usr/local/share/edge_driver
          sudo rm -rf /usr/local/share/gecko_driver
          sudo rm -rf /imagegeneration
          
          sudo apt-get clean
          sudo apt-get autoremove -y
          docker system prune -af --volumes || true
          sudo rm -rf /tmp/*
          sudo rm -rf /var/tmp/*
          
          echo "=== 清理后磁盘空间 ==="
          df -h /

      # ============================================================
      # 第2步：拉取代码
      # ============================================================
      - name: Checkout code
        uses: actions/checkout@v4

      # ============================================================
      # 第3步：只下载必须离线的 Hugging Face 模型
      # ============================================================
      - name: Download Hugging Face models
        run: |
          export HF_HOME=$(pwd)/hf_cache
          mkdir -p $HF_HOME/hub
          
          python -m pip install --upgrade pip huggingface_hub
          
          # 使用 Python 脚本下载所有模型
          python3 << 'PYEOF'
          import os, sys
          from huggingface_hub import snapshot_download
          
          os.environ['HF_ENDPOINT'] = 'https://hf-mirror.com'
          cache_dir = os.path.join(os.getcwd(), 'hf_cache', 'hub')
          
          models = [
              "datalab-to/surya_layout",
              "datalab-to/texify",
              "vikp/surya_rec2",
              "vikp/surya_det3",
              "vikp/surya_tablerec",
              "datalab-to/ocr_error_detection",
              "datalab-to/inline_math_detection",
              "sentence-transformers/all-MiniLM-L6-v2",
          ]
          
          success = 0
          for model in models:
              try:
                  print(f"\n{'='*60}")
                  print(f"下载: {model}")
                  print(f"{'='*60}")
                  snapshot_download(
                      model,
                      cache_dir=cache_dir,
                      local_files_only=False,
                      resume_download=True,
                  )
                  print(f"✓ {model}")
                  success += 1
              except Exception as e:
                  print(f"⚠ {model}: {e}")
                  if "inline_math" not in model:
                      sys.exit(1)
          
          print(f"\n下载完成: {success}/{len(models)}")
          PYEOF
          
          # 创建 latest 软链接（HF 离线模式必须）
          echo ""
          echo "=== 创建 latest 软链接 ==="
          cd hf_cache/hub
          for model_dir in models--*; do
            if [ -d "$model_dir" ]; then
              snapshot_dir=$(ls -dt $model_dir/snapshots/*/ 2>/dev/null | head -1)
              if [ -n "$snapshot_dir" ]; then
                snapshot_name=$(basename $snapshot_dir)
                ln -sfn ../snapshots/$snapshot_name $model_dir/latest
                echo "  ✓ $model_dir -> $snapshot_name"
              else
                echo "  ⚠ $model_dir: 未找到 snapshot"
              fi
            fi
          done
          cd ../..
          
          echo ""
          echo "=== 模型缓存信息 ==="
          echo "大小: $(du -sh hf_cache | cut -f1)"
          echo "模型:"
          ls -d hf_cache/hub/models--* 2>/dev/null | while read d; do
            echo "  - $(basename $d)"
          done

      # ============================================================
      # 第4步：设置 Docker Buildx
      # ============================================================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ============================================================
      # 第5步：构建镜像
      # ============================================================
      - name: Build Docker image
        run: |
          VERSION=${{ github.event.inputs.version }}
          DOCKER_TAG="${IMAGE_NAME}:${VERSION}"
          PIP_INDEX="${{ github.event.inputs.pip_index }}"
          
          # 生成 pip 配置（如果指定了镜像源）
          if [ -z "$PIP_INDEX" ]; then
            PIP_CONFIG=""
          else
            MIRROR_HOST=$(echo "$PIP_INDEX" | sed 's|https://||;s|/.*||')
            PIP_CONFIG="RUN mkdir -p /root/.pip && echo '[global]' > /root/.pip/pip.conf && echo 'index-url = ${PIP_INDEX}' >> /root/.pip/pip.conf && echo 'trusted-host = ${MIRROR_HOST}' >> /root/.pip/pip.conf"
          fi
          
          cat > Dockerfile.custom << 'DOCKERFILE_EOF'
          FROM ubuntu:22.04
          
          # ----------------------------------------------------------
          # 系统依赖（apt 在线安装）
          # ----------------------------------------------------------
          RUN apt-get update && \
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
              python3.11 python3.11-venv python3.11-dev python3-pip \
              tzdata curl wget ffmpeg libsm6 libxext6 libnss3 \
              libxi6 libxrandr2 libxcomposite1 libxcursor1 libxdamage1 \
              libxfixes3 libxrender1 libasound2 libatk1.0-0 libgtk-3-0 \
              libreoffice libjpeg-dev libpango-1.0-0 libpangoft2-1.0-0 \
              weasyprint poppler-utils tesseract-ocr tesseract-ocr-eng \
              tesseract-ocr-chi-sim libgl1-mesa-glx libglib2.0-0 \
              && apt-get clean && rm -rf /var/lib/apt/lists/*
          
          WORKDIR /app
          COPY . /app
          
          # ----------------------------------------------------------
          # Python 依赖（pip 在线安装）
          # ----------------------------------------------------------
          RUN python3.11 -m venv /opt/venv && \
              /opt/venv/bin/pip install --upgrade pip setuptools wheel && \
              /opt/venv/bin/pip install --no-cache-dir "mmore[all,cpu]"
          
          # ----------------------------------------------------------
          # 环境变量
          # ----------------------------------------------------------
          ENV HF_HOME=/opt/huggingface \
              HF_HUB_CACHE=/opt/huggingface/hub \
              TRANSFORMERS_CACHE=/opt/huggingface/hub \
              SENTENCE_TRANSFORMERS_HOME=/opt/huggingface \
              HF_HUB_OFFLINE=1 \
              TRANSFORMERS_OFFLINE=1 \
              PATH="/opt/venv/bin:$PATH" \
              PYTHONUNBUFFERED=1 \
              CUDA_VISIBLE_DEVICES=""
          
          # ----------------------------------------------------------
          # 复制离线模型
          # ----------------------------------------------------------
          COPY ./hf_cache/ /opt/huggingface/
          
          # ----------------------------------------------------------
          # 修复 latest 链接
          # ----------------------------------------------------------
          RUN cd /opt/huggingface/hub && \
              for d in models--*/; do \
                if [ -d "$d" ] && [ ! -L "$d/latest" ]; then \
                  snapshot_dir=$(ls -dt $d/snapshots/*/ 2>/dev/null | head -1); \
                  [ -n "$snapshot_dir" ] && ln -sfn ../snapshots/$(basename $snapshot_dir) $d/latest; \
                fi; \
              done && \
              echo "Cached models:" && ls -d models--* 2>/dev/null || echo "No models found"
          
          # ----------------------------------------------------------
          # 验证模型（用 Python 脚本避免 shell 引号嵌套）
          # ----------------------------------------------------------
          RUN cat > /tmp/verify_models.py << 'VERIFY'
          import os, sys, glob
          
          os.environ['HF_HUB_OFFLINE'] = '1'
          os.environ['TRANSFORMERS_OFFLINE'] = '1'
          
          print("=" * 50)
          print("模型验证")
          print("=" * 50)
          
          hub_dir = '/opt/huggingface/hub'
          models = sorted(glob.glob(f'{hub_dir}/models--*'))
          print(f"模型数量: {len(models)}")
          for m in models:
              name = os.path.basename(m)
              latest = os.path.join(m, 'latest')
              status = '✓' if os.path.islink(latest) else '✗'
              print(f"  {status} {name}")
          
          # 测试嵌入模型
          try:
              from sentence_transformers import SentenceTransformer
              model = SentenceTransformer('all-MiniLM-L6-v2')
              embeddings = model.encode(['test'])
              print(f"✓ 嵌入模型验证通过 (shape: {embeddings.shape})")
          except Exception as e:
              print(f"✗ 嵌入模型验证失败: {e}")
              sys.exit(1)
          
          print("✓ 所有模型验证通过")
          VERIFY
          
          RUN /opt/venv/bin/python3 /tmp/verify_models.py && rm /tmp/verify_models.py
          
          # ----------------------------------------------------------
          # 入口脚本（Python 版，避免 shell 转义问题）
          # ----------------------------------------------------------
          RUN cat > /entrypoint.py << 'PYEOF'
          #!/opt/venv/bin/python3
          import os, sys, glob
          
          print("=" * 50)
          print("  MMORE CPU Container")
          print("=" * 50)
          
          print(f"Python: {sys.version.split()[0]}")
          
          import torch
          print(f"PyTorch: {torch.__version__}")
          
          print(f"Offline: HF_HUB_OFFLINE={os.environ.get('HF_HUB_OFFLINE')}")
          
          models = sorted(glob.glob('/opt/huggingface/hub/models--*'))
          print(f"Models cached: {len(models)}")
          for m in models:
              print(f"  - {os.path.basename(m)}")
          
          print("=" * 50)
          
          if len(sys.argv) > 1:
              os.execvp(sys.argv[1], sys.argv[1:])
          PYEOF
          
          RUN chmod +x /entrypoint.py
          
          # ----------------------------------------------------------
          # RAG 测试脚本
          # ----------------------------------------------------------
          RUN cat > /app/run_rag.py << 'PYEOF'
          #!/opt/venv/bin/python3
          import os, sys, glob
          
          print("=" * 60)
          print("  MMORE RAG Pipeline Test")
          print("=" * 60)
          
          print(f"\n[1] 离线模式:")
          print(f"    HF_HUB_OFFLINE = {os.environ.get('HF_HUB_OFFLINE')}")
          print(f"    TRANSFORMERS_OFFLINE = {os.environ.get('TRANSFORMERS_OFFLINE')}")
          
          print(f"\n[2] 模型缓存:")
          models = sorted(glob.glob('/opt/huggingface/hub/models--*'))
          print(f"    找到 {len(models)} 个模型:")
          for m in models:
              print(f"    - {os.path.basename(m)}")
          
          print(f"\n[3] 导入测试:")
          try:
              import torch
              print(f"    ✓ PyTorch {torch.__version__}")
              import mmore
              print(f"    ✓ MMORE 导入成功")
          except Exception as e:
              print(f"    ✗ 导入失败: {e}")
              sys.exit(1)
          
          print(f"\n[4] 嵌入模型:")
          try:
              from sentence_transformers import SentenceTransformer
              model = SentenceTransformer('all-MiniLM-L6-v2')
              embeddings = model.encode(["测试文本", "Test document"])
              print(f"    ✓ 编码成功, shape: {embeddings.shape}")
          except Exception as e:
              print(f"    ✗ 嵌入模型失败: {e}")
          
          print(f"\n[5] MMORE 组件:")
          for comp in ['process', 'index', 'rag']:
              try:
                  exec(f"from mmore import {comp}")
                  print(f"    ✓ mmore.{comp}")
              except Exception as e:
                  print(f"    ⚠ mmore.{comp}: {e}")
          
          print(f"\n{'=' * 60}")
          print(f"测试完成！容器就绪。")
          print(f"{'=' * 60}")
          PYEOF
          
          RUN chmod +x /app/run_rag.py
          
          # ----------------------------------------------------------
          # 入口点和默认命令
          # ----------------------------------------------------------
          ENTRYPOINT ["/opt/venv/bin/python3", "/entrypoint.py"]
          CMD ["python3", "/app/run_rag.py"]
          DOCKERFILE_EOF
          
          # 构建镜像
          echo ""
          echo "=== 构建镜像 ==="
          docker buildx build \
            --platform linux/amd64 \
            -f Dockerfile.custom \
            -t ${DOCKER_TAG} \
            --load \
            .
          
          echo ""
          echo "=== 镜像信息 ==="
          docker images ${DOCKER_TAG}
          
          # 快速验证
          echo ""
          echo "=== 快速验证 ==="
          docker run --rm ${DOCKER_TAG} python3 -c "
          import os; os.environ['HF_HUB_OFFLINE']='1'
          from sentence_transformers import SentenceTransformer
          m = SentenceTransformer('all-MiniLM-L6-v2')
          print('✓ 镜像验证通过')
          " || echo "⚠ 快速验证失败（可能需要检查）"
          
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "DOCKER_TAG=${DOCKER_TAG}" >> $GITHUB_ENV

      # ============================================================
      # 第6步：导出镜像
      # ============================================================
      - name: Export and compress image
        run: |
          echo "=== 当前磁盘空间 ==="
          df -h /
          
          DOCKER_TAG="${{ env.DOCKER_TAG }}"
          VERSION="${{ env.VERSION }}"
          
          echo "=== 导出并压缩镜像 ==="
          docker save ${DOCKER_TAG} | gzip -1 > ${IMAGE_NAME}-${VERSION}.tar.gz
          
          echo ""
          echo "=== 压缩包 ==="
          ls -lh ${IMAGE_NAME}-${VERSION}.tar.gz
          
          # 释放空间
          docker rmi ${DOCKER_TAG} || true
          docker system prune -af --volumes || true
          
          echo ""
          echo "=== 导出后磁盘空间 ==="
          df -h /
          
          echo "TAR_FILE=${IMAGE_NAME}-${VERSION}.tar.gz" >> $GITHUB_ENV

      # ============================================================
      # 第7步：分卷（如果需要）
      # ============================================================
      - name: Split file if exceeds 2GB
        id: split
        run: |
          TAR_FILE="${{ env.TAR_FILE }}"
          VERSION="${{ env.VERSION }}"
          
          if [ ! -f "$TAR_FILE" ]; then
            echo "错误：找不到文件 $TAR_FILE"
            exit 1
          fi
          
          FILE_SIZE=$(stat -c%s "$TAR_FILE" 2>/dev/null || echo 0)
          MAX_SIZE=$((2 * 1024 * 1024 * 1024))
          
          echo "文件大小: $(($FILE_SIZE / 1024 / 1024 / 1024)) GB ($FILE_SIZE bytes)"
          
          if [ $FILE_SIZE -gt $MAX_SIZE ]; then
            echo ""
            echo "=== 文件超过 2GB，开始分卷 ==="
            split -b 1900M -d "$TAR_FILE" "${TAR_FILE}.part"
            rm "$TAR_FILE"
            
            # 创建合并脚本
            cat > merge.sh << MERGEEOF
          #!/bin/bash
          set -e
          
          SCRIPT_DIR="\$(cd "\$(dirname "\$0")" && pwd)"
          cd "\$SCRIPT_DIR"
          
          FILE_NAME="${IMAGE_NAME}-${VERSION}.tar.gz"
          
          echo "================================================"
          echo "  MMORE CPU/AMD64 Docker 镜像合并导入"
          echo "  版本: ${VERSION}"
          echo "================================================"
          
          PARTS=\$(ls \${FILE_NAME}.part* 2>/dev/null | sort -V)
          
          if [ -z "\$PARTS" ]; then
            echo "错误：未找到分卷文件 \${FILE_NAME}.part*"
            echo "请确保所有分卷文件在同一目录"
            exit 1
          fi
          
          PART_COUNT=\$(echo "\$PARTS" | wc -l)
          echo "找到 \${PART_COUNT} 个分卷文件"
          echo ""
          echo "正在合并..."
          cat \$PARTS > "\${FILE_NAME}"
          
          echo "合并完成！"
          echo "文件大小: \$(du -h \${FILE_NAME} | cut -f1)"
          echo ""
          echo "----------------------------------------"
          echo "导入镜像："
          echo "  gunzip -c \${FILE_NAME} | docker load"
          echo ""
          echo "运行容器："
          echo "  docker run --rm -it ${IMAGE_NAME}:${VERSION}"
          echo ""
          echo "RAG 测试："
          echo "  docker run --rm ${IMAGE_NAME}:${VERSION} python3 /app/run_rag.py"
          echo "----------------------------------------"
          MERGEEOF
            
            chmod +x merge.sh
            
            PART_COUNT=$(ls ${TAR_FILE}.part* 2>/dev/null | wc -l)
            echo "分卷数量: ${PART_COUNT}"
            echo "split=true" >> $GITHUB_OUTPUT
          else
            echo "文件大小在限制内，无需分卷"
            echo "split=false" >> $GITHUB_OUTPUT
          fi

      # ============================================================
      # 第8步：创建 Release 并上传
      # ============================================================
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.release_title }}
          body: |
            ## MMORE CPU/AMD64 离线 Docker 镜像
            
            **版本**: ${{ github.event.inputs.version }}
            **架构**: amd64 (x86_64) 
            **类型**: CPU only
            
            ---
            
            ### 📦 包含内容
            
            #### 功能模块
            - ✅ 完整 MMORE 包 (`process`, `index`, `rag`)
            - ✅ CPU 优化版 PyTorch
            - ✅ 预配置离线模式 (`HF_HUB_OFFLINE=1`)
            
            #### 内置模型 (8个)
            | 模型 | 用途 |
            |------|------|
            | `surya_layout` | 文档布局分析 |
            | `surya_det3` | 文本行检测 |
            | `surya_rec2` | 文字识别 (OCR) |
            | `surya_tablerec` | 表格结构识别 |
            | `texify` | 数学公式识别 |
            | `ocr_error_detection` | OCR 纠错 |
            | `inline_math_detection` | 行内公式检测 |
            | `all-MiniLM-L6-v2` | 嵌入向量化 (RAG) |
            
            ---
            
            ### 📥 下载与使用
            
            ${{ steps.split.outputs.split == 'true' && '#### 步骤 1：合并分卷文件' || '' }}
            ${{ steps.split.outputs.split == 'true' && '下载所有 `.part*` 文件和 `merge.sh` 到同一目录，然后：' || '' }}
            
            ```bash
            ${{ steps.split.outputs.split == 'true' && 'chmod +x merge.sh' || '' }}
            ${{ steps.split.outputs.split == 'true' && './merge.sh' || '' }}
            ${{ steps.split.outputs.split == 'true' && '' || '# 无需合并，直接导入' }}
