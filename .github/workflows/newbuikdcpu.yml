name: Build Offline Docker Image (CPU, amd64)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        default: 'latest'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare model cache directory
        run: mkdir -p ./model_cache

      - name: Download required models
        run: |
          pip install --no-cache-dir huggingface_hub sentence-transformers
          python -c "
          from huggingface_hub import snapshot_download
          cache_dir = './model_cache'
          snapshot_download('sentence-transformers/all-MiniLM-L6-v2',
                            cache_dir=cache_dir,
                            force_download=True,
                            resume_download=False)
          print('All-MiniLM-L6-v2 downloaded.')
          "

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.cpu
          platforms: linux/amd64
          push: false
          load: true
          tags: mmore-offline:latest
          build-args: |
            MODEL_CACHE_DIR=./model_cache

      - name: Save, compress and split Docker image
        run: |
          docker save mmore-offline:latest | gzip > mmore-offline.tar.gz
          echo "Full image size: $(du -h mmore-offline.tar.gz | cut -f1)"
          
          # 分卷切割，每卷 1800MB (留安全余量，确保单卷 < 2GB)
          split -b 1800M -d mmore-offline.tar.gz mmore-offline.tar.gz.part
          rm mmore-offline.tar.gz
          
          echo "Generated parts:"
          ls -lh mmore-offline.tar.gz.part*
          
          # 生成校验文件，方便验证下载完整性
          sha256sum mmore-offline.tar.gz.part* > checksums.txt

      - name: Upload parts to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          body: |
            ## MMORE 离线 Docker 镜像（CPU, amd64）
            
            ### 📦 下载说明
            本镜像采用分卷压缩，请下载所有 `.part*` 文件及 `checksums.txt`。
            
            ### 🔧 合并与导入
            ```bash
            # 1. 校验文件完整性（可选）
            sha256sum -c checksums.txt
            
            # 2. 合并分卷
            cat mmore-offline.tar.gz.part* > mmore-offline.tar.gz
            
            # 3. 导入 Docker
            gunzip -c mmore-offline.tar.gz | docker load
            
            # 4. 运行
            docker run -d --name mmore --network host mmore-offline:latest
