name: Build Offline Docker Image (CPU, amd64)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:   # 允许手动触发

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (for cross-platform if needed)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare model cache directory
        run: |
          mkdir -p ./model_cache

      # 预下载所有必需模型到 ./model_cache 中，后续 Dockerfile 里直接 COPY 进镜像
      - name: Download required models
        run: |
          pip install --no-cache-dir huggingface_hub sentence-transformers docling
          python -c "
          import os
          from huggingface_hub import snapshot_download
          
          cache_dir = './model_cache'
          # Docling 核心模型
          snapshot_download('ds4sd/docling-models', cache_dir=cache_dir,
                            force_download=True, resume_download=False)
          
          # 嵌入模型（如需多个可添加）
          snapshot_download('sentence-transformers/all-MiniLM-L6-v2', cache_dir=cache_dir,
                            force_download=True, resume_download=False)
          
          # 表格转换模型（选配）
          # snapshot_download('microsoft/table-transformer-detection', cache_dir=cache_dir)
          # snapshot_download('microsoft/table-transformer-structure-recognition', cache_dir=cache_dir)
          
          # EasyOCR 模型会在运行时自动下载，若要完全离线，还需下载 easyocr 特定模型。
          # 但 EasyOCR 模型较大且结构固定，可先安装 easyocr 然后执行:
          # import easyocr; reader = easyocr.Reader(['en']); reader.download()
          # 并将下载的文件收集到 ./model_cache/easyocr 中。
          print('Models downloaded successfully.')
          "

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.cpu
          platforms: linux/amd64
          push: false
          load: true
          tags: mmore-offline:latest
          build-args: |
            MODEL_CACHE_DIR=./model_cache

      - name: Save and compress Docker image
        run: |
          docker save mmore-offline:latest | gzip > mmore-offline.tar.gz

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mmore-offline.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
