name: Build Offline Docker Image (CPU, amd64)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        default: 'latest'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare model cache directory
        run: mkdir -p ./model_cache

      # 只下载核心嵌入模型，不再下载 docling-models
      - name: Download required models
        run: |
          pip install --no-cache-dir huggingface_hub sentence-transformers
          python -c "
          from huggingface_hub import snapshot_download
          cache_dir = './model_cache'
          snapshot_download('sentence-transformers/all-MiniLM-L6-v2',
                            cache_dir=cache_dir,
                            force_download=True,
                            resume_download=False)
          print('All-MiniLM-L6-v2 downloaded.')
          "

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.cpu
          platforms: linux/amd64
          push: false
          load: true
          tags: mmore-offline:latest
          build-args: |
            MODEL_CACHE_DIR=./model_cache

      - name: Save and compress Docker image
        run: |
          docker save mmore-offline:latest | gzip > mmore-offline.tar.gz
          echo "Image size: $(du -h mmore-offline.tar.gz | cut -f1)"

      # 若镜像仍大于2GB，可启用分割逻辑（默认注释掉）
      # - name: Split image if too large
      #   run: |
      #     if [ $(stat -c%s mmore-offline.tar.gz) -gt 2147483648 ]; then
      #       split -b 1800M -d mmore-offline.tar.gz mmore-offline.tar.gz.part
      #       rm mmore-offline.tar.gz
      #     fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          files: |
            mmore-offline.tar.gz*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
