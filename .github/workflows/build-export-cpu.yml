name: Build CPU Image & Export Tar to Release
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      # 只构建 linux/amd64 架构（你的服务器能跑）
      - name: Build and export CPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ubuntu/Dockerfile
          outputs: type=docker,dest=mmore-cpu-amd64.tar
          tags: mmore:cpu
          build-args: DEVICE=cpu
          # 关键：只构建 amd64
          platforms: linux/amd64

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: mmore-cpu-amd64.tar
          tag_name: cpu-docker-tar-amd64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
