name: Build CPU API Image & Upload to Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 构建镜像（Dockerfile 内部自动处理模型，无外部下载）
      - name: Build and export
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ubuntu/Dockerfile
          outputs: type=docker,dest=mmore-cpu-api.tar
          tags: mmore-cpu-api:latest
          build-args: |
            DEVICE=cpu
          platforms: linux/amd64

      # 上传到 Release（已修复正确 action）
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: mmore-cpu-api.tar
          tag_name: cpu-api-final
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
