name: Build CPU API Image & Upload to Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 下载项目必需的基础模型（打包进镜像，开箱即用）
      - name: Download required models
        run: |
          mkdir -p models
          # 下载必需模型文件（你可以根据项目需求增删）
          wget -q https://huggingface.co/MBZUAI/GeoLlama/resolve/main/mmore_required_base_model.pth -P models/
          wget -q https://huggingface.co/MBZUAI/GeoLlama/resolve/main/mmore_api_support_model.bin -P models/
          ls -lh models/

      # 构建带模型 + API 支持的 CPU 镜像
      - name: Build and export Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ubuntu/Dockerfile
          outputs: type=docker,dest=mmore-cpu-api.tar
          tags: mmore-cpu-api:latest
          build-args: |
            DEVICE=cpu
            INSTALL_API=true
          platforms: linux/amd64

      # 上传打包好的镜像（含模型）到 GitHub Release
      - name: Upload image to Release
        uses: softprops/gh-release@v2
        with:
          files: mmore-cpu-api.tar
          tag_name: cpu-api-final
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
