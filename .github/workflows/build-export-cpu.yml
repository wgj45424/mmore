name: Build CPU API Image & Upload to Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 下载 mmore 必需的 3 个核心模型
      - name: Download required models
        run: |
          mkdir -p models
          wget -q --no-check-certificate https://huggingface.co/MBZUAI/mmore/resolve/main/mmore_final_checkpoint.pth -P models/
          wget -q --no-check-certificate https://huggingface.co/MBZUAI/GeoLlama-7B-v1/resolve/main/config.json -P models/
          wget -q --no-check-certificate https://huggingface.co/MBZUAI/GeoLlama-7B-v1/resolve/main/generation_config.json -P models/
          ls -lh models/

      # 构建镜像（自动把 models 文件夹打包进镜像）
      - name: Build and export
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ubuntu/Dockerfile
          outputs: type=docker,dest=mmore-cpu-api.tar
          tags: mmore-cpu-api:latest
          build-args: |
            DEVICE=cpu
          platforms: linux/amd64

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: mmore-cpu-api.tar
          tag_name: cpu-api-final
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
