name: Build CPU Image & Export Tar to Release
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      # 构建并输出镜像文件（直接输出 tar，不用 docker save）
      - name: Build and export CPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ubuntu/Dockerfile
          outputs: type=docker,dest=mmore-cpu-amd64.tar
          tags: mmore:cpu
          build-args: |
            DEVICE=cpu
          platforms: linux/amd64

      # 上传到 Release
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: mmore-cpu-amd64.tar
          tag_name: cpu-docker-tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
