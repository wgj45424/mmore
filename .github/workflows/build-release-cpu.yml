name: Build and Release CPU Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},suffix=-cpu
            type=semver,pattern={{major}}.{{minor}},suffix=-cpu
            type=raw,value=latest-cpu,enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version == 'latest' }}
            type=raw,value=${{ github.event.inputs.version }}-cpu,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/ubuntu/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            DEVICE=cpu
            UV_OVERRIDE=--extra all,cpu
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save Docker image as tar file
        run: |
          mkdir -p release-artifacts
          VERSION_TAG="${{ steps.meta.outputs.version }}"
          if [ -z "$VERSION_TAG" ]; then
            VERSION_TAG="${{ github.event.inputs.version }}"
          fi
          
          # Pull and save for both architectures
          docker pull --platform linux/amd64 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION_TAG}-cpu
          docker save ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION_TAG}-cpu | gzip > release-artifacts/mmcore-${VERSION_TAG}-cpu-amd64.tar.gz
          
          docker pull --platform linux/arm64 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION_TAG}-cpu
          docker save ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION_TAG}-cpu | gzip > release-artifacts/mmcore-${VERSION_TAG}-cpu-arm64.tar.gz

      - name: Generate release notes
        run: |
          cat > release-artifacts/RELEASE_NOTES.md << 'EOF'
          # MMCore CPU Docker Image ${{ steps.meta.outputs.version || github.event.inputs.version }}
          
          ## 📦 Overview
          CPU-only Docker image for MMCore based on Ubuntu 22.04.
          
          ## 🖥️ Supported Platforms
          - `linux/amd64` - x86_64 servers (e.g., Intel/AMD processors)
          - `linux/arm64` - ARM64 machines (e.g., AWS Graviton, Apple Silicon)
          
          ## 🚀 Usage
          
          ### Option 1: Pull from GitHub Container Registry
          ```bash
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version || github.event.inputs.version }}-cpu
