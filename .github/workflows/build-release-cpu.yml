name: 🐳 Build and Release CPU Docker Image (AMD64)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        default: 'latest'
      user_uid:
        description: 'User UID (default: 1000)'
        required: false
        default: '1000'
      user_gid:
        description: 'Group GID (default: 1000)'
        required: false
        default: '1000'
      model_name:
        description: '预下载模型 (默认: all-MiniLM-L6-v2)'
        required: false
        default: 'sentence-transformers/all-MiniLM-L6-v2'

jobs:
  build-and-release-cpu:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Get model name
        id: model
        run: |
          MODEL="${{ github.event.inputs.model_name || 'sentence-transformers/all-MiniLM-L6-v2' }}"
          echo "model=$MODEL" >> $GITHUB_OUTPUT
          SHORT_MODEL=$(echo $MODEL | sed 's/.*\///')
          echo "short_model=$SHORT_MODEL" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}-cpu
            type=raw,value=latest-cpu

      - name: Build & push CPU image (AMD64 only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ubuntu/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DEVICE=cpu
            USER_UID=${{ github.event.inputs.user_uid || '1000' }}
            USER_GID=${{ github.event.inputs.user_gid || '1000' }}
            UV_OVERRIDE=--extra all,cpu
            PREDOWNLOAD_MODEL=${{ steps.model.outputs.model }}
            HF_ENDPOINT=https://hf-mirror.com
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create release directory
        run: |
          mkdir -p release-artifacts
          VERSION="${{ steps.version.outputs.version }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Pull and save AMD64 image
        run: |
          VERSION="${{ env.VERSION }}"
          docker pull --platform linux/amd64 ghcr.io/${{ github.repository }}:${VERSION}-cpu
          docker save ghcr.io/${{ github.repository }}:${VERSION}-cpu | gzip > release-artifacts/mmcore-${VERSION}-cpu-amd64.tar.gz
          echo "AMD64_SIZE=$(du -h release-artifacts/mmcore-${VERSION}-cpu-amd64.tar.gz | cut -f1)" >> $GITHUB_ENV

      - name: Generate SHA256 checksums
        run: |
          cd release-artifacts
          sha256sum *.tar.gz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate release notes
        run: |
          VERSION="${{ env.VERSION }}"
          MODEL_FULL="${{ steps.model.outputs.model }}"
          SHORT_MODEL="${{ steps.model.outputs.short_model }}"
          BUILD_DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          cat > release-artifacts/RELEASE_NOTES.md << EOF
          # MMCore CPU Docker Image v${VERSION} (AMD64)

          ## 📦 概述
          基于 Ubuntu 22.04 的 CPU 版本 Docker 镜像，预装模型，支持离线使用。

          ## 🤖 预装模型
          - **模型**: ${MODEL_FULL}
          - **大小**: ~90MB
          - **状态**: ✅ 已预下载，离线可用

          ## 🖥️ 支持平台
          - **linux/amd64** - x86_64 服务器

          ## 📥 下载方式

          ### 方式1：从 GHCR 拉取
          \`\`\`bash
          docker pull ghcr.io/${{ github.repository }}:${VERSION}-cpu
          docker pull ghcr.io/${{ github.repository }}:latest-cpu
          \`\`\`

          ### 方式2：下载离线包
          | 文件 | 大小 |
          |------|------|
          | mmcore-${VERSION}-cpu-amd64.tar.gz | ${{ env.AMD64_SIZE }} |

          ## 🚀 快速开始

          ### 运行 Index API
          \`\`\`bash
          docker run -d \\
            --name mmore-api \\
            --restart always \\
            -p 9000:8000 \\
            --entrypoint "" \\
            ghcr.io/${{ github.repository }}:${VERSION}-cpu \\
            mmore index-api -c /app/examples/retriever_api/config.yaml --host 0.0.0.0 --port 8000
          \`\`\`

          ### 使用离线包
          \`\`\`bash
          gunzip -c mmcore-${VERSION}-cpu-amd64.tar.gz | docker load
          docker run -d --name mmore-api --restart always -p 9000:8000 \\
            --entrypoint "" ghcr.io/${{ github.repository }}:${VERSION}-cpu \\
            mmore index-api -c /app/examples/retriever_api/config.yaml --host 0.0.0.0 --port 8000
          \`\`\`

          ## 🔧 构建信息
          - **版本**: ${VERSION}
          - **模型**: ${MODEL_FULL}
          - **构建时间**: ${BUILD_DATE}
          - **架构**: linux/amd64
          - **构建参数**:
            - \`DEVICE=cpu\`
            - \`PREDOWNLOAD_MODEL=${MODEL_FULL}\`

          ## 📝 校验和
          \`\`\`
          $(cat release-artifacts/SHA256SUMS.txt)
          \`\`\`
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && format('Release {0} (CPU AMD64)', github.ref_name) || format('Release v{0} - CPU AMD64', steps.version.outputs.version) }}
          body_path: release-artifacts/RELEASE_NOTES.md
          files: |
            release-artifacts/*.tar.gz
            release-artifacts/SHA256SUMS.txt
          draft: false
          prerelease: false
          fail_on_unmatched_files: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mmcore-cpu-amd64-${{ steps.version.outputs.version }}
          path: |
            release-artifacts/*.tar.gz
            release-artifacts/SHA256SUMS.txt
          retention-days: 30
          compression-level: 0

      - name: Summary
        run: |
          echo "## ✅ 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**版本**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**架构**: linux/amd64" >> $GITHUB_STEP_SUMMARY
          echo "**模型**: ${{ steps.model.outputs.model }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**镜像**: ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}-cpu" >> $GITHUB_STEP_SUMMARY
          echo "**离线包**: mmcore-${{ steps.version.outputs.version }}-cpu-amd64.tar.gz (${{ env.AMD64_SIZE }})" >> $GITHUB_STEP_SUMMARY
