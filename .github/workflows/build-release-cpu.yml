name: Build and Release CPU Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},suffix=-cpu
            type=semver,pattern={{major}}.{{minor}},suffix=-cpu
            type=raw,value=latest-cpu,enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version == 'latest' }}
            type=raw,value=${{ github.event.inputs.version }}-cpu,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/ubuntu/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            DEVICE=cpu
            UV_OVERRIDE=--extra all,cpu
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save Docker image as tar file
        run: |
          mkdir -p release-artifacts
          VERSION_TAG="${{ steps.meta.outputs.version }}"
          if [ -z "$VERSION_TAG" ]; then
            VERSION_TAG="${{ github.event.inputs.version }}"
          fi
          
          # Pull and save for both architectures
          docker pull --platform linux/amd64 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION_TAG}-cpu
          docker save ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION_TAG}-cpu | gzip > release-artifacts/mmcore-${VERSION_TAG}-cpu-amd64.tar.gz
          
          docker pull --platform linux/arm64 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION_TAG}-cpu
          docker save ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION_TAG}-cpu | gzip > release-artifacts/mmcore-${VERSION_TAG}-cpu-arm64.tar.gz

      - name: Generate release notes
        run: |
          cat > release-artifacts/RELEASE_NOTES.md << EOF
          # MMCore CPU Docker Image ${{ steps.meta.outputs.version || github.event.inputs.version }}
          
          ## Overview
          CPU-only Docker image for MMCore based on Ubuntu 22.04.
          
          ## Supported Platforms
          - linux/amd64 (x86_64 servers)
          - linux/arm64 (ARM64 machines, Apple Silicon)
          
          ## Usage
          
          ### Pull from GHCR
          \`\`\`bash
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version || github.event.inputs.version }}-cpu
          \`\`\`
          
          ### Run Container
          \`\`\`bash
          docker run -it \\
            -v ./examples:/app/examples \\
            -v ./.cache:/mmoreuser/.cache \\
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version || github.event.inputs.version }}-cpu
          \`\`\`
          
          ### Load from tar.gz (without internet)
          \`\`\`bash
          # For AMD64
          gunzip -c mmcore-${{ steps.meta.outputs.version || github.event.inputs.version }}-cpu-amd64.tar.gz | docker load
          
          # For ARM64
          gunzip -c mmcore-${{ steps.meta.outputs.version || github.event.inputs.version }}-cpu-arm64.tar.gz | docker load
          \`\`\`
          
          ## Build Information
          - Build Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          - GitHub SHA: ${{ github.sha }}
          - Build Arguments:
            - DEVICE=cpu
            - UV_OVERRIDE=--extra all,cpu
          
          EOF

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-artifacts/*.tar.gz
            release-artifacts/RELEASE_NOTES.md
          body_path: release-artifacts/RELEASE_NOTES.md
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: Create Manual Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Release v${{ github.event.inputs.version }} (CPU)
          files: |
            release-artifacts/*.tar.gz
            release-artifacts/RELEASE_NOTES.md
          body_path: release-artifacts/RELEASE_NOTES.md
          draft: false
          prerelease: false

      - name: Upload artifacts to workflow run
        uses: actions/upload-artifact@v3
        with:
          name: cpu-docker-images
          path: release-artifacts/
          retention-days: 30
