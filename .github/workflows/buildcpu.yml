name: 🐳 Publish Docker Images on GHCR

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      build_type:
        description: '选择要构建的镜像类型'
        required: true
        default: 'both'
        type: choice
        options:
          - both      # 构建 CPU 和 GPU
          - cpu       # 只构建 CPU
          - gpu       # 只构建 GPU
          - student   # 构建学生版 GPU 镜像
      user_uid:
        description: 'User UID (仅 student 模式需要)'
        required: false
        default: '1000'
      user_gid:
        description: 'Group GID (仅 student 模式需要)'
        required: false
        default: '1000'

jobs:
  # 学生镜像 Job
  publish-student-image:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'student'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=student-uid${{ inputs.user_uid }}-gid${{ inputs.user_gid }}-gpu

      - name: Build & push student GPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ubuntu/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DEVICE=gpu
            USER_UID=${{ inputs.user_uid }}
            USER_GID=${{ inputs.user_gid }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 普通镜像 Job（支持手动触发）
  publish-github-container:
    if: |
      github.event_name == 'push' || 
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.build_type == 'both' || github.event.inputs.build_type == 'cpu' || github.event.inputs.build_type == 'gpu'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        device: ${{ fromJson(
          github.event_name == 'push' && '["cpu", "gpu"]' ||
          (github.event.inputs.build_type == 'both' && '["cpu", "gpu"]') ||
          (github.event.inputs.build_type == 'cpu' && '["cpu"]') ||
          (github.event.inputs.build_type == 'gpu' && '["gpu"]')
        ) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},suffix=-${{ matrix.device }}
            type=edge,suffix=-${{ matrix.device }}
            type=sha,suffix=-${{ matrix.device }}

      - name: Build & push ${{ matrix.device }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ubuntu/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DEVICE=${{ matrix.device }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
