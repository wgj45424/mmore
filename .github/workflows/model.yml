name: Download MMORE Models Only

on:
  workflow_dispatch:
    inputs:
      output_format:
        description: 'Output format'
        required: true
        default: 'tar.gz'
        type: choice
        options:
          - 'tar.gz'
          - 'directory'

env:
  OUTPUT_NAME: mmore-models

jobs:
  download-models:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ============================================================
      # 第1步：下载所有 HF 模型
      # ============================================================
      - name: Download all Hugging Face models
        run: |
          export HF_HOME=$(pwd)/${OUTPUT_NAME}/huggingface
          mkdir -p $HF_HOME/hub
          
          python -m pip install --upgrade pip huggingface_hub
          
          python3 << 'PYEOF'
          import os, sys
          from huggingface_hub import snapshot_download
          
          os.environ['HF_ENDPOINT'] = 'https://hf-mirror.com'
          cache_dir = os.path.join(os.getcwd(), 'mmore-models', 'huggingface', 'hub')
          
          models = [
              "datalab-to/surya_layout",
              "datalab-to/texify",
              "vikp/surya_rec2",
              "vikp/surya_det3",
              "vikp/surya_tablerec",
              "datalab-to/ocr_error_detection",
              "datalab-to/inline_math_detection",
              "sentence-transformers/all-MiniLM-L6-v2",
          ]
          
          print("=" * 60)
          print("开始下载 MMORE 所需模型")
          print("=" * 60)
          
          success = 0
          for model in models:
              try:
                  print(f"\n{'='*60}")
                  print(f"[{success+1}/{len(models)}] 下载: {model}")
                  print(f"{'='*60}")
                  snapshot_download(
                      model,
                      cache_dir=cache_dir,
                      local_files_only=False,
                      resume_download=True,
                  )
                  print(f"✓ {model}")
                  success += 1
              except Exception as e:
                  print(f"⚠ {model}: {e}")
                  if "inline_math" not in model:
                      sys.exit(1)
          
          print(f"\n下载完成: {success}/{len(models)}")
          PYEOF
          
          # 创建 latest 软链接
          echo ""
          echo "=== 创建 latest 软链接 ==="
          cd ${OUTPUT_NAME}/huggingface/hub
          for model_dir in models--*; do
            if [ -d "$model_dir" ]; then
              snapshot_dir=$(ls -dt $model_dir/snapshots/*/ 2>/dev/null | head -1)
              if [ -n "$snapshot_dir" ]; then
                snapshot_name=$(basename $snapshot_dir)
                ln -sfn ../snapshots/$snapshot_name $model_dir/latest
                echo "  ✓ $model_dir -> $snapshot_name"
              else
                echo "  ⚠ $model_dir: 未找到 snapshot"
              fi
            fi
          done
          cd ../../..
          
          # 验证模型结构
          echo ""
          echo "=== 验证模型结构 ==="
          for d in ${OUTPUT_NAME}/huggingface/hub/models--*/; do
            name=$(basename $d)
            if [ -L "$d/latest" ]; then
              echo "  ✓ $name"
            else
              echo "  ✗ $name (缺少 latest)"
            fi
          done
          echo ""
          echo "模型总大小: $(du -sh ${OUTPUT_NAME} | cut -f1)"

      # ============================================================
      # 第2步：创建 README
      # ============================================================
      - name: Create README
        run: |
          cat > ${OUTPUT_NAME}/README.md << EOF
          # MMORE 离线模型包

          ## 包含的模型 (8个)

          | 模型 | 用途 |
          |------|------|
          | surya_layout | 文档布局分析 |
          | texify | 公式识别 |
          | surya_rec2 | 文字识别 (OCR) |
          | surya_det3 | 文本行检测 |
          | surya_tablerec | 表格结构识别 |
          | ocr_error_detection | OCR 纠错 |
          | inline_math_detection | 行内公式检测 |
          | all-MiniLM-L6-v2 | 嵌入向量化 (RAG) |

          ## 使用方法

          ### 挂载到 MMORE 容器

          \`\`\`bash
          tar -xzf mmore-models.tar.gz
          docker run --rm -it \
            -v \$(pwd)/mmore-models/huggingface:/opt/huggingface \
            -e HF_HUB_OFFLINE=1 \
            mmore-cpu:latest
          \`\`\`
          EOF
          
          echo "✓ README 创建完成"

      # ============================================================
      # 第3步：压缩打包
      # ============================================================
      - name: Package models
        run: |
          FORMAT="${{ github.event.inputs.output_format }}"
          
          if [ "$FORMAT" = "tar.gz" ]; then
            echo "=== 压缩为 tar.gz ==="
            tar -czf ${OUTPUT_NAME}.tar.gz ${OUTPUT_NAME}/
            echo ""
            echo "压缩包信息:"
            ls -lh ${OUTPUT_NAME}.tar.gz
            echo ""
            echo "MD5: $(md5sum ${OUTPUT_NAME}.tar.gz | cut -d' ' -f1)"
            echo "SHA256: $(sha256sum ${OUTPUT_NAME}.tar.gz | cut -d' ' -f1)"
            echo "PACKAGE_FILE=${OUTPUT_NAME}.tar.gz" >> $GITHUB_ENV
          else
            echo "=== 保持目录格式 ==="
            echo "目录大小: $(du -sh ${OUTPUT_NAME} | cut -f1)"
            echo "PACKAGE_FILE=${OUTPUT_NAME}" >> $GITHUB_ENV
          fi

      # ============================================================
      # 第4步：分卷（超过 2GB）
      # ============================================================
      - name: Split if exceeds 2GB
        id: split
        run: |
          FILE="${{ env.PACKAGE_FILE }}"
          
          if [ ! -f "$FILE" ]; then
            echo "跳过：非文件格式或文件不存在"
            echo "split=skip" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          FILE_SIZE=$(stat -c%s "$FILE")
          MAX_SIZE=$((2 * 1024 * 1024 * 1024))
          
          echo "文件: $(ls -lh $FILE)"
          echo "大小: $(($FILE_SIZE / 1024 / 1024 / 1024)) GB ($FILE_SIZE bytes)"
          
          if [ $FILE_SIZE -gt $MAX_SIZE ]; then
            echo ""
            echo "=== 文件超过 2GB，开始分卷 ==="
            split -b 1900M -d "$FILE" "${FILE}.part"
            rm "$FILE"
            
            # 创建合并脚本
            cat > merge.sh << 'MERGEEOF'
          #!/bin/bash
          set -e
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          cd "$SCRIPT_DIR"
          
          FILE_NAME="mmore-models.tar.gz"
          
          echo "================================================"
          echo "  MMORE 模型包合并导入"
          echo "================================================"
          
          PARTS=$(ls ${FILE_NAME}.part* 2>/dev/null | sort -V)
          
          if [ -z "$PARTS" ]; then
            echo "错误：未找到分卷文件 ${FILE_NAME}.part*"
            exit 1
          fi
          
          PART_COUNT=$(echo "$PARTS" | wc -l)
          echo "找到 ${PART_COUNT} 个分卷文件"
          echo ""
          echo "正在合并..."
          cat $PARTS > "${FILE_NAME}"
          
          echo "合并完成！"
          echo "文件大小: $(du -h ${FILE_NAME} | cut -f1)"
          echo ""
          echo "----------------------------------------"
          echo "解压:"
          echo "  tar -xzf ${FILE_NAME}"
          echo ""
          echo "挂载到 MMORE 容器:"
          echo "  docker run --rm -it \\"
          echo "    -v \$(pwd)/mmore-models/huggingface:/opt/huggingface \\"
          echo "    -e HF_HUB_OFFLINE=1 \\"
          echo "    mmore-cpu:latest"
          echo "----------------------------------------"
          MERGEEOF
            
            chmod +x merge.sh
            
            echo ""
            echo "分卷文件:"
            ls -lh ${FILE}.part*
            echo ""
            echo "merge.sh:"
            ls -lh merge.sh
            
            echo "split=true" >> $GITHUB_OUTPUT
          else
            echo "文件小于 2GB，无需分卷"
            echo "split=false" >> $GITHUB_OUTPUT
          fi

      # ============================================================
      # 第5步：调试 - 列出待上传文件
      # ============================================================
      - name: Debug - List files
        run: |
          echo "============================================"
          echo "  待上传文件"
          echo "============================================"
          echo ""
          echo "当前目录: $(pwd)"
          echo ""
          echo "tar.gz 文件:"
          ls -lh *.tar.gz* 2>/dev/null || echo "  (无)"
          echo ""
          echo "merge.sh:"
          ls -lh merge.sh 2>/dev/null || echo "  (不存在)"
          echo ""
          echo "分卷标记: ${{ steps.split.outputs.split }}"
          echo "============================================"

      # ============================================================
      # 第6步：创建 Release 并上传
      # ============================================================
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: models-${{ github.run_number }}
          name: "MMORE Models Pack v${{ github.run_number }}"
          body: |
            ## MMORE 离线模型包
            
            **构建时间**: ${{ github.event.repository.updated_at }}
            **模型数量**: 8 个
            **总大小**: ~3.1GB
            
            ---
            
            ### 📦 包含的模型
            
            | 模型 | 用途 |
            |------|------|
            | `surya_layout` | 文档布局分析 |
            | `texify` | 公式识别 |
            | `surya_rec2` | 文字识别 (OCR) |
            | `surya_det3` | 文本行检测 |
            | `surya_tablerec` | 表格结构识别 |
            | `ocr_error_detection` | OCR 纠错 |
            | `inline_math_detection` | 行内公式检测 |
            | `all-MiniLM-L6-v2` | 嵌入向量化 (RAG) |
            
            ---
            
            ### 📥 使用说明
            
            ${{ steps.split.outputs.split == 'true' && '#### 步骤1：合并分卷文件\n下载所有 `.part*` 文件和 `merge.sh` 到同一目录，然后：\n```bash\nchmod +x merge.sh\n./merge.sh\n```\n\n' || '' }}
            #### 解压并挂载到 MMORE 容器
            
            ```bash
            # 解压
            tar -xzf mmore-models.tar.gz
            
            # 挂载到容器
            docker run --rm -it \
              -v $(pwd)/mmore-models/huggingface:/opt/huggingface \
              -e HF_HUB_OFFLINE=1 \
              mmore-cpu:latest
