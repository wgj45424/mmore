name: Download MMORE Models Only

on:
  workflow_dispatch:

env:
  OUTPUT_NAME: mmore-models

jobs:
  download-models:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ============================================================
      # 第1步：写入下载脚本（移除不可用模型）
      # ============================================================
      - name: Write download script
        run: |
          cat > download_models.py << 'PYEOF'
          import os
          from huggingface_hub import snapshot_download

          os.environ['HF_ENDPOINT'] = 'https://hf-mirror.com'
          cache_dir = os.path.join(os.getcwd(), 'mmore-models', 'huggingface', 'hub')

          # 移除 datalab-to/inline_math_detection（仓库已不存在）
          models = [
              "datalab-to/surya_layout",
              "datalab-to/texify",
              "vikp/surya_rec2",
              "vikp/surya_det3",
              "vikp/surya_tablerec",
              "datalab-to/ocr_error_detection",
              "sentence-transformers/all-MiniLM-L6-v2",
          ]

          for i, model in enumerate(models):
              print(f"[{i+1}/{len(models)}] Downloading: {model}")
              snapshot_download(model, cache_dir=cache_dir, resume_download=True)

          print("All models downloaded.")
          PYEOF

      # ============================================================
      # 第2步：下载模型
      # ============================================================
      - name: Download Hugging Face models
        run: |
          mkdir -p ${OUTPUT_NAME}/huggingface/hub
          python -m pip install --upgrade pip huggingface_hub
          python3 download_models.py

      # ============================================================
      # 第3步：创建 latest 软链接
      # ============================================================
      - name: Create latest symlinks
        run: |
          cd ${OUTPUT_NAME}/huggingface/hub
          for model_dir in models--*; do
            snapshot_dir=$(ls -dt $model_dir/snapshots/*/ 2>/dev/null | head -1)
            if [ -n "$snapshot_dir" ]; then
              ln -sfn ../snapshots/$(basename $snapshot_dir) $model_dir/latest
              echo "  OK $model_dir"
            fi
          done
          cd ../../..
          echo "Total size: $(du -sh ${OUTPUT_NAME} | cut -f1)"

      # ============================================================
      # 第4步：生成 README
      # ============================================================
      - name: Create README
        run: |
          cat > write_readme.py << 'PYEOF'
          lines = [
              "# MMORE Offline Models Pack",
              "",
              "## Models (7)",
              "",
              "| Model | Purpose |",
              "|-------|---------|",
              "| surya_layout | Document layout analysis |",
              "| texify | Formula recognition |",
              "| surya_rec2 | Text recognition (OCR) |",
              "| surya_det3 | Text line detection |",
              "| surya_tablerec | Table structure recognition |",
              "| ocr_error_detection | OCR error correction |",
              "| all-MiniLM-L6-v2 | Embedding (RAG) |",
              "",
              "## Usage",
              "",
              "```bash",
              "tar -xzf mmore-models.tar.gz",
              "docker run --rm -it \\",
              "  -v $(pwd)/mmore-models/huggingface:/opt/huggingface \\",
              "  -e HF_HUB_OFFLINE=1 \\",
              "  mmore-cpu:latest",
              "```",
          ]
          with open('mmore-models/README.md', 'w') as f:
              f.write('\n'.join(lines))
          PYEOF
          python3 write_readme.py

      # ============================================================
      # 第5步：打包
      # ============================================================
      - name: Package models
        run: |
          tar -czf ${OUTPUT_NAME}.tar.gz ${OUTPUT_NAME}/
          ls -lh ${OUTPUT_NAME}.tar.gz

      # ============================================================
      # 第6步：分卷（超过2GB）
      # ============================================================
      - name: Split if exceeds 2GB
        id: split
        run: |
          FILE="${OUTPUT_NAME}.tar.gz"
          SIZE=$(stat -c%s "$FILE")
          MAX=$((2 * 1024 * 1024 * 1024))
          echo "Size: $((SIZE / 1024 / 1024)) MB"
          if [ $SIZE -gt $MAX ]; then
            split -b 1900M -d "$FILE" "${FILE}.part"
            rm "$FILE"
            cat > merge.sh << 'MERGEEOF'
          #!/bin/bash
          set -e
          cd "$(dirname "$0")"
          F="mmore-models.tar.gz"
          cat ${F}.part* > "${F}"
          echo "Merged: $(du -h ${F} | cut -f1)"
          echo "Extract: tar -xzf ${F}"
          echo "Mount: docker run --rm -it -v $(pwd)/mmore-models/huggingface:/opt/huggingface -e HF_HUB_OFFLINE=1 mmore-cpu:latest"
          MERGEEOF
            chmod +x merge.sh
            echo "split=true" >> $GITHUB_OUTPUT
          else
            echo "split=false" >> $GITHUB_OUTPUT
          fi

      # ============================================================
      # 第7步：上传到 Release
      # ============================================================
      - name: Upload to Release
        run: |
          TAG="models-${{ github.run_number }}"
          
          gh release create "${TAG}" \
            --title "MMORE Models Pack v${{ github.run_number }}" \
            --notes "7 models (~3GB). Extract and mount to MMORE container."
          
          for f in mmore-models.tar.gz*; do
            [ -f "$f" ] && gh release upload "${TAG}" "$f" --clobber
          done
          [ -f "merge.sh" ] && gh release upload "${TAG}" "merge.sh" --clobber
          
          echo "Download: https://github.com/${{ github.repository }}/releases/tag/${TAG}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
