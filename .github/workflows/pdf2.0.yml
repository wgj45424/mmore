name: Manual2.0 Build and Release MMORE (CPU/AMD64)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'
        type: string
      release_title:
        description: 'Release title'
        required: false
        default: 'MMORE CPU/AMD64 Release'
        type: string

env:
  IMAGE_NAME: mmore-cpu
  PLATFORM: linux/amd64

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      # ============ 第1步：最大化磁盘空间 ============
      - name: Maximize disk space
        run: |
          echo "=== 初始磁盘空间 ==="
          df -h /
          
          echo "=== 开始清理 ==="
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/julia
          sudo rm -rf /opt/microsoft
          sudo rm -rf /opt/pipx
          sudo rm -rf /usr/local/graalvm
          sudo rm -rf /usr/local/share/edge_driver
          sudo rm -rf /usr/local/share/gecko_driver
          sudo rm -rf /imagegeneration
          
          sudo apt-get clean
          sudo apt-get autoremove -y
          docker system prune -af --volumes || true
          sudo rm -rf /tmp/*
          sudo rm -rf /var/tmp/*
          
          echo "=== 清理后磁盘空间 ==="
          df -h /

      - name: Checkout code
        uses: actions/checkout@v4

      # ============ 第2步：下载模型（使用 Python 脚本代替 hf 命令） ============
      - name: Download Hugging Face models
        run: |
          export HF_HOME=$(pwd)/hf_cache
          mkdir -p $HF_HOME/hub
          
          python -m pip install --upgrade pip
          python -m pip install huggingface_hub
          
          # 使用 Python 脚本下载，避免 hf 命令兼容性问题
          python3 << 'PYEOF'
          import os
          import sys
          from huggingface_hub import snapshot_download
          
          # 设置镜像加速
          os.environ['HF_ENDPOINT'] = 'https://hf-mirror.com'
          
          cache_dir = os.path.join(os.getcwd(), 'hf_cache', 'hub')
          
          models = [
              "datalab-to/surya_layout",
              "datalab-to/texify",
              "vikp/surya_rec2",
              "vikp/surya_det3",
              "vikp/surya_tablerec",
              "datalab-to/ocr_error_detection",
              "datalab-to/inline_math_detection",
              "sentence-transformers/all-MiniLM-L6-v2",
          ]
          
          success_count = 0
          for model in models:
              try:
                  print(f"\n{'='*60}")
                  print(f"下载: {model}")
                  print(f"{'='*60}")
                  snapshot_download(
                      model,
                      cache_dir=cache_dir,
                      local_files_only=False,
                      resume_download=True,
                      force_download=False,
                  )
                  print(f"✓ {model} 下载成功")
                  success_count += 1
              except Exception as e:
                  print(f"✗ {model} 下载失败: {e}")
                  if model == "datalab-to/inline_math_detection":
                      print("  (可选模型，跳过)")
                  else:
                      sys.exit(1)
          
          print(f"\n{'='*60}")
          print(f"下载完成: {success_count}/{len(models)} 个模型")
          print(f"{'='*60}")
          PYEOF
          
          # 创建 latest 软链接
          echo "=== 创建 latest 软链接 ==="
          cd hf_cache/hub
          for model_dir in models--*; do
            if [ -d "$model_dir" ]; then
              snapshot_dir=$(ls -dt $model_dir/snapshots/*/ 2>/dev/null | head -1)
              if [ -n "$snapshot_dir" ]; then
                snapshot_name=$(basename $snapshot_dir)
                ln -sfn ../snapshots/$snapshot_name $model_dir/latest
                echo "  ✓ $model_dir -> latest -> $snapshot_name"
              else
                echo "  ⚠ $model_dir: 未找到 snapshot"
              fi
            fi
          done
          cd ../..
          
          echo "=== 模型缓存大小 ==="
          du -sh hf_cache/
          
          echo "=== 模型列表 ==="
          ls -la hf_cache/hub/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ============ 第3步：构建镜像 ============
      - name: Build Docker image
        run: |
          VERSION=${{ github.event.inputs.version }}
          DOCKER_TAG="${IMAGE_NAME}:${VERSION}"
          
          cat > Dockerfile.custom << 'DOCKERFILE_EOF'
          FROM ubuntu:22.04
          
          # 安装系统依赖
          RUN apt-get update && \
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
              python3.11 python3.11-venv python3.11-dev python3-pip \
              tzdata curl wget ffmpeg libsm6 libxext6 libnss3 \
              libxi6 libxrandr2 libxcomposite1 libxcursor1 libxdamage1 libxfixes3 libxrender1 \
              libasound2 libatk1.0-0 libgtk-3-0 libreoffice libjpeg-dev \
              libpango-1.0-0 libpangoft2-1.0-0 weasyprint \
              poppler-utils tesseract-ocr tesseract-ocr-eng tesseract-ocr-chi-sim \
              libgl1-mesa-glx libglib2.0-0 \
              && apt-get clean && rm -rf /var/lib/apt/lists/* /var/cache/apt/* && \
              mkdir -p /root/.pip && \
              echo "[global]" > /root/.pip/pip.conf && \
              echo "index-url = https://pypi.tuna.tsinghua.edu.cn/simple" >> /root/.pip/pip.conf && \
              echo "trusted-host = pypi.tuna.tsinghua.edu.cn" >> /root/.pip/pip.conf
          
          WORKDIR /app
          
          # 复制项目并安装依赖
          COPY . /app
          RUN python3.11 -m venv /opt/venv && \
              /opt/venv/bin/pip install --upgrade pip setuptools wheel && \
              /opt/venv/bin/pip install --no-cache-dir "mmore[all,cpu]" && \
              rm -rf /root/.cache/pip /root/.cache/pypoetry
          
          # 设置环境变量
          ENV HF_HOME=/opt/huggingface \
              HF_HUB_CACHE=/opt/huggingface/hub \
              TRANSFORMERS_CACHE=/opt/huggingface/hub \
              SENTENCE_TRANSFORMERS_HOME=/opt/huggingface \
              HF_HUB_OFFLINE=1 \
              TRANSFORMERS_OFFLINE=1 \
              PATH="/opt/venv/bin:$PATH" \
              PYTHONUNBUFFERED=1 \
              CUDA_VISIBLE_DEVICES=""
          
          # 复制预下载的模型
          COPY ./hf_cache/ /opt/huggingface/
          
          # 验证模型
          RUN echo "=== 验证模型结构 ===" && \
              echo "模型目录:" && ls /opt/huggingface/hub/ && \
              echo "" && \
              echo "latest 链接:" && \
              for d in /opt/huggingface/hub/models--*/; do \
                name=$(basename $d); \
                if [ -L "$d/latest" ]; then \
                  echo "  ✓ $name -> $(readlink $d/latest)"; \
                else \
                  echo "  ✗ $name (缺少 latest 链接!)"; \
                  snapshot_dir=$(ls -dt $d/snapshots/*/ 2>/dev/null | head -1); \
                  if [ -n "$snapshot_dir" ]; then \
                    ln -sfn ../snapshots/$(basename $snapshot_dir) $d/latest; \
                    echo "    已自动修复"; \
                  fi; \
                fi; \
              done
          
          # 创建入口脚本
          RUN echo '#!/bin/bash' > /entrypoint.sh && \
              echo 'set -e' >> /entrypoint.sh && \
              echo 'echo "=== MMORE Container Started ==="' >> /entrypoint.sh && \
              echo 'echo "Python: $(python3 --version)"' >> /entrypoint.sh && \
              echo 'echo "PyTorch: $(python3 -c \"import torch; print(torch.__version__)\")"' >> /entrypoint.sh && \
              echo 'echo "Models cached: $(ls /opt/huggingface/hub/models--* 2>/dev/null | wc -l)"' >> /entrypoint.sh && \
              echo 'echo "Offline mode: HF_HUB_OFFLINE=$HF_HUB_OFFLINE"' >> /entrypoint.sh && \
              echo 'exec "$@"' >> /entrypoint.sh && \
              chmod +x /entrypoint.sh
          
          # 创建 RAG 测试脚本
          RUN cat > /app/run_rag.py << 'PYEOF'
          #!/opt/venv/bin/python3
          """MMORE RAG 离线测试脚本"""
          import os, sys
          from pathlib import Path
          
          print("=" * 60)
          print("MMORE RAG Pipeline Test (Offline Mode)")
          print("=" * 60)
          
          print(f"\n[1] 离线模式:")
          print(f"    HF_HUB_OFFLINE = {os.environ.get('HF_HUB_OFFLINE')}")
          print(f"    TRANSFORMERS_OFFLINE = {os.environ.get('TRANSFORMERS_OFFLINE')}")
          
          print(f"\n[2] 模型缓存:")
          cache_dir = Path(os.environ.get('HF_HOME', '/opt/huggingface'))
          hub_dir = cache_dir / 'hub'
          if hub_dir.exists():
              models = list(hub_dir.glob('models--*'))
              print(f"    找到 {len(models)} 个模型:")
              for m in sorted(models):
                  latest = m / 'latest'
                  status = '✓' if latest.exists() else '✗ (缺少链接)'
                  print(f"    {status} {m.name}")
          else:
              print(f"    ✗ 缓存目录不存在: {hub_dir}")
              sys.exit(1)
          
          print(f"\n[3] 导入测试:")
          try:
              import torch
              print(f"    ✓ PyTorch {torch.__version__}")
              import mmore
              print(f"    ✓ MMORE 导入成功")
          except Exception as e:
              print(f"    ✗ 导入失败: {e}")
              sys.exit(1)
          
          print(f"\n[4] 嵌入模型测试:")
          try:
              from sentence_transformers import SentenceTransformer
              model = SentenceTransformer('all-MiniLM-L6-v2')
              embeddings = model.encode(["测试文本", "Test document"])
              print(f"    ✓ 嵌入编码成功, shape: {embeddings.shape}")
          except Exception as e:
              print(f"    ✗ 嵌入模型失败: {e}")
          
          print(f"\n[5] MMORE 组件测试:")
          
          try:
              from mmore.process import DocumentProcessor
              proc = DocumentProcessor()
              print(f"    ✓ DocumentProcessor 初始化成功")
          except Exception as e:
              print(f"    ⚠ DocumentProcessor: {e}")
          
          try:
              from mmore.index import IndexBuilder
              builder = IndexBuilder()
              print(f"    ✓ IndexBuilder 初始化成功")
          except Exception as e:
              print(f"    ⚠ IndexBuilder: {e}")
          
          try:
              from mmore.rag import Retriever
              retriever = Retriever()
              print(f"    ✓ Retriever 初始化成功")
          except Exception as e:
              print(f"    ⚠ Retriever: {e}")
          
          print(f"\n{'=' * 60}")
          print("测试完成！")
          print(f"{'=' * 60}")
          PYEOF
          
          RUN chmod +x /app/run_rag.py
          
          ENTRYPOINT ["/entrypoint.sh"]
          CMD ["python3", "/app/run_rag.py"]
          DOCKERFILE_EOF
          
          # 构建镜像
          echo "=== 开始构建镜像 ==="
          docker buildx build \
            --platform linux/amd64 \
            -f Dockerfile.custom \
            -t ${DOCKER_TAG} \
            --load \
            .
          
          echo "=== 镜像信息 ==="
          docker images ${DOCKER_TAG}
          
          # 快速验证
          echo "=== 快速验证 ==="
          docker run --rm ${DOCKER_TAG} python3 -c "
          import os
          os.environ['HF_HUB_OFFLINE']='1'
          from sentence_transformers import SentenceTransformer
          m = SentenceTransformer('all-MiniLM-L6-v2')
          print('✓ 模型加载测试通过')
          "
          
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "DOCKER_TAG=${DOCKER_TAG}" >> $GITHUB_ENV

      # ============ 第4步：导出并压缩 ============
      - name: Export and compress image
        run: |
          echo "=== 当前磁盘空间 ==="
          df -h /
          
          DOCKER_TAG="${{ env.DOCKER_TAG }}"
          VERSION="${{ env.VERSION }}"
          
          # 管道直接压缩，不保留中间 tar
          echo "=== 导出并压缩镜像 ==="
          docker save ${DOCKER_TAG} | gzip -1 > ${IMAGE_NAME}-${VERSION}.tar.gz
          
          echo "=== 压缩包信息 ==="
          ls -lh ${IMAGE_NAME}-${VERSION}.tar.gz
          
          # 释放空间
          docker rmi ${DOCKER_TAG} || true
          docker system prune -af --volumes || true
          
          echo "=== 导出后磁盘空间 ==="
          df -h /
          
          echo "TAR_FILE=${IMAGE_NAME}-${VERSION}.tar.gz" >> $GITHUB_ENV

      # ============ 第5步：分卷（如需） ============
      - name: Split file if exceeds 2GB
        id: split
        run: |
          TAR_FILE="${{ env.TAR_FILE }}"
          VERSION="${{ env.VERSION }}"
          
          if [ ! -f "$TAR_FILE" ]; then
            echo "错误：找不到文件 $TAR_FILE"
            exit 1
          fi
          
          FILE_SIZE=$(stat -c%s "$TAR_FILE" 2>/dev/null || stat -f%z "$TAR_FILE" 2>/dev/null)
          MAX_SIZE=$((2 * 1024 * 1024 * 1024))
          echo "文件大小: $(($FILE_SIZE / 1024 / 1024 / 1024)) GB ($FILE_SIZE bytes)"
          
          if [ $FILE_SIZE -gt $MAX_SIZE ]; then
            echo "=== 文件超过 2GB，开始分卷 ==="
            split -b 1900M -d "$TAR_FILE" "${TAR_FILE}.part"
            rm "$TAR_FILE"
            
            # 创建合并导入脚本
            cat > merge.sh << MERGEEOF
          #!/bin/bash
          set -e
          
          SCRIPT_DIR="\$(cd "\$(dirname "\$0")" && pwd)"
          cd "\$SCRIPT_DIR"
          
          echo "================================================"
          echo "  MMORE CPU/AMD64 Docker 镜像合并导入脚本"
          echo "  版本: ${VERSION}"
          echo "================================================"
          
          FILE_NAME="${IMAGE_NAME}-${VERSION}.tar.gz"
          PARTS=\$(ls \${FILE_NAME}.part* 2>/dev/null | sort -V)
          
          if [ -z "\$PARTS" ]; then
            echo "错误：未找到分卷文件 \${FILE_NAME}.part*"
            echo "请确保所有分卷文件在同一目录"
            exit 1
          fi
          
          PART_COUNT=\$(echo "\$PARTS" | wc -l)
          echo "找到 \${PART_COUNT} 个分卷文件"
          
          echo ""
          echo "正在合并..."
          cat \$PARTS > "\${FILE_NAME}"
          
          echo "合并完成！文件大小: \$(du -h \${FILE_NAME} | cut -f1)"
          echo ""
          echo "导入镜像："
          echo "  gunzip -c \${FILE_NAME} | docker load"
          echo ""
          echo "运行容器："
          echo "  docker run --rm -it ${IMAGE_NAME}:${VERSION}"
          echo ""
          echo "运行 RAG 测试："
          echo "  docker run --rm ${IMAGE_NAME}:${VERSION} python3 /app/run_rag.py"
          echo "================================================"
          MERGEEOF
            
            chmod +x merge.sh
            echo "分卷数量: $(ls ${TAR_FILE}.part* | wc -l)"
            echo "split=true" >> $GITHUB_OUTPUT
          else
            echo "文件大小在限制内，无需分卷"
            echo "split=false" >> $GITHUB_OUTPUT
          fi

      # ============ 第6步：创建 Release ============
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.release_title }}
          body: |
            ## MMORE CPU/AMD64 离线 Docker 镜像
            
            **版本**: ${{ github.event.inputs.version }}
            **架构**: amd64 (x86_64) 
            **设备**: CPU only
            
            ### 📦 包含内容
            
            #### 功能模块
            - ✅ 完整 MMORE 包 (process, index, rag)
            - ✅ CPU 优化版 PyTorch
            - ✅ 预配置离线模式
            
            #### 内置模型 (8个)
            | 模型 | 用途 |
            |------|------|
            | surya_layout | 文档布局分析 |
            | surya_det3 | 文本行检测 |
            | surya_rec2 | 文字识别 (OCR) |
            | surya_tablerec | 表格结构识别 |
            | texify | 数学公式识别 |
            | ocr_error_detection | OCR 纠错 |
            | inline_math_detection | 行内公式检测 |
            | all-MiniLM-L6-v2 | 嵌入向量化 (RAG) |
            
            ### 📥 使用说明
            
            ${{ steps.split.outputs.split == 'true' && '#### 步骤1：下载并合并分卷' || '' }}
            ${{ steps.split.outputs.split == 'true' && '```bash' || '' }}
            ${{ steps.split.outputs.split == 'true' && '# 下载所有 .part* 文件和 merge.sh 到同一目录' || '' }}
            ${{ steps.split.outputs.split == 'true' && 'chmod +x merge.sh' || '' }}
            ${{ steps.split.outputs.split == 'true' && './merge.sh' || '' }}
            ${{ steps.split.outputs.split == 'true' && '```' || '' }}
            
            #### 导入镜像
            ```bash
            gunzip -c mmore-cpu-${{ github.event.inputs.version }}.tar.gz | docker load
